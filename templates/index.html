<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JCP CHAT | Justin Chachap</title>
    <style>
        :root {
            --primary: #4285f4; --secondary: #9b51e0;
            --bg: #0b0d0e; --glass: rgba(255, 255, 255, 0.05);
            --glow: #4285f4; --error: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100dvh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background: var(--bg);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        header {
            flex-shrink: 0; padding: 12px 15px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }

        .gemini-logo {
            font-size: 18px; font-weight: 800; letter-spacing: 1px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 2s linear infinite;
        }

        .feedback-bar { display: flex; gap: 6px; }
        .fb-btn {
            font-size: 9px; padding: 5px 9px; border-radius: 7px; 
            border: 1px solid var(--glow); color: white; text-decoration: none;
            transition: 0.2s; background: rgba(255,255,255,0.03);
            font-weight: bold; text-transform: uppercase;
        }
        .fb-btn:hover { background: var(--glow); box-shadow: 0 0 15px var(--glow); }

        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px 15px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none; scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        .msg-container { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .user-container { align-self: flex-end; flex-direction: row-reverse; }
        .bot-container { align-self: flex-start; }

        .message {
            padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5;
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.08); word-wrap: break-word;
            white-space: pre-wrap; /* Preserves AI formatting */
        }
        .user-msg { background: #2b2d31; border-bottom-right-radius: 4px; }
        .bot-msg { background: var(--glass); border-bottom-left-radius: 4px; border-left: 3px solid var(--glow); }

        .bot-msg-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .message-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            margin-bottom: 2px;
        }

        .msg-container:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: var(--glow);
            border-color: var(--glow);
            box-shadow: 0 0 10px rgba(66, 133, 244, 0.3);
        }

        .copy-feedback {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--glow);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .input-area {
            flex-shrink: 0; padding: 15px; display: flex; gap: 10px;
            background: #16181c; border-top: 1px solid rgba(255,255,255,0.1);
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        input {
            flex: 1; padding: 14px 20px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
            background: #1e1f20; color: white; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--glow); }
        input:disabled { opacity: 0.6; }
        
        #sendBtn {
            background: linear-gradient(135deg, var(--glow), var(--glow));
            border: none; width: 48px; height: 48px; border-radius: 50%;
            color: white; cursor: pointer; transition: 0.3s; flex-shrink: 0;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
        }
        #sendBtn:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes pop { from { opacity:0; transform:scale(0.9) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    </style>
</head>
<body>
    <header>
        <div>
            <div class="gemini-logo">JCP CHAT</div>
            <div style="font-size: 9px; opacity: 0.7; font-weight: bold; letter-spacing: 0.5px;">Made by Jûstîn Çhãçhãp</div>
        </div>
        <div class="feedback-bar">
            <a href="https://www.facebook.com/justin.chachap" class="fb-btn">Facebook</a>
            <a href="https://www.instagram.com/justin_chacha.p?igsh=OXNhOXF5d3psMXV2" class="fb-btn">Instagram</a>
            <a href="https://www.tiktok.com/@justinchachap?_r=1&_t=ZS-95mmfRzaMg1" class="fb-btn">tiktok</a>
        </div>
    </header>

    <div id="chat-box" role="log" aria-live="polite">
        <div class="msg-container bot-container">
            <div class="message bot-msg">Hello this is JCP chat. How can I help you today?</div>
        </div>
    </div>

    <form class="input-area" id="chatForm">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" required>
        <button type="submit" id="sendBtn">✔</button>
    </form>

    <script>
        const box = document.getElementById('chat-box');
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        const form = document.getElementById('chatForm');

        // Store last user message and messages for retry
        let lastUserMessage = '';
        const messageStore = new Map();

        // Logic to add messages to the screen
        function addMessage(text, type, isError = false) {
            const container = document.createElement('div');
            container.className = `msg-container ${type}-container`;
            
            if (type === 'bot' && !isError) {
                // Create wrapper for message + actions
                const wrapper = document.createElement('div');
                wrapper.className = 'bot-msg-wrapper';
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${type}-msg`;
                msgDiv.textContent = text;
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                
                // Copy button
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerHTML = '📋';
                copyBtn.title = 'Copy message';
                copyBtn.onclick = (e) => {
                    e.preventDefault();
                    navigator.clipboard.writeText(text).then(() => {
                        showCopyFeedback();
                    });
                };
                
                // Retry button
                const retryBtn = document.createElement('button');
                retryBtn.className = 'action-btn';
                retryBtn.innerHTML = '🔄';
                retryBtn.title = 'Retry message';
                retryBtn.onclick = (e) => {
                    e.preventDefault();
                    if (lastUserMessage) {
                        retryMessage(lastUserMessage);
                    }
                };
                
                actionsDiv.appendChild(copyBtn);
                actionsDiv.appendChild(retryBtn);
                
                wrapper.appendChild(msgDiv);
                wrapper.appendChild(actionsDiv);
                container.appendChild(wrapper);
            } else {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${type}-msg`;
                msgDiv.textContent = text;
                container.appendChild(msgDiv);
            }
            
            box.appendChild(container);
            
            // Scroll to the newest message
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function showCopyFeedback() {
            const feedback = document.createElement('div');
            feedback.className = 'copy-feedback';
            feedback.textContent = '✓ Copied to clipboard';
            document.body.appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 2000);
        }

        function retryMessage(userMessage) {
            if (btn.disabled) return;
            
            // Remove last bot message
            const botMessages = document.querySelectorAll('.bot-container');
            if (botMessages.length > 1) {
                botMessages[botMessages.length - 1].remove();
            }
            
            // Send message again
            sendMessage(userMessage);
        }

        async function sendMessage(text) {
            lastUserMessage = text;
            
            input.disabled = true;
            btn.disabled = true;
            btn.innerHTML = `<span style="font-size:12px">...</span>`;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                if (response.ok && data.response) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage(`[ALERT]: ${data.error || "System Busy. Try again later."}`, 'bot', true);
                }
            } catch (err) {
                console.error('Error:', err);
                addMessage("[ALERT]: Unable to reach the server. Please check your connection and try again.", 'bot', true);
            } finally {
                input.disabled = false;
                btn.disabled = false;
                btn.innerHTML = '✔';
            }
        }

        // Form Submit Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text || btn.disabled) return;

            // UI Feedback
            addMessage(text, 'user');
            input.value = '';
            
            await sendMessage(text);
        });

        // Background Color Cycle Logic
        const colors = ['#4285f4', '#9b51e0', '#34a853', '#fbbc05'];
        let colorIdx = 0;
        setInterval(() => {
            colorIdx = (colorIdx + 1) % colors.length;
            document.documentElement.style.setProperty('--glow', colors[colorIdx]);
        }, 5000);
    </script>
</body>
</html>
